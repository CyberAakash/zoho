baseURL: https://CyberAakash.github.io/zoho/
languageCode: en-us
title: Zoho Desk Docs

module:
  imports:
    - path: github.com/imfing/hextra

menu:
  main:
    - name: Search
      weight: 1
      params:
        type: search
    - name: GitHub
      url: https://github.com/CyberAakash/zoho
      weight: 2
      params:
        type: icon
        name: github

markup:
  goldmark:
    renderer:
      unsafe: true

outputs:
  page:
    - html
    - markdown
  section:
    - html
    - rss
    - markdown

params:
  navbar:
    displayTitle: true
    displayLogo: false
  footer:
    displayCopyright: false
    displayPoweredBy: false
  theme:
    default: dark
    displayToggle: false
  editURL:
    enable: false
  page:
    contextMenu:
      enable: true
